name: Project Creator

on:
  schedule:
    - cron: '0 0,12 * * *'  # A cada 12h
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    env:
      OLLAMA_MODELS_DIR: /home/runner/.ollama/models
      OLLAMA_MODEL: qwen3:1.7b
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Setup Ollama
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ env.OLLAMA_MODEL }}
          models-dir: ${{ env.OLLAMA_MODELS_DIR }}
          startup-delay-seconds: "5"

      - name: Run Project Creator Agent
        env:
          PYTHONPATH: .
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_OWNER: juninmd
          ENABLE_AI: true
          AI_PROVIDER: ollama
          AI_MODEL: ${{ env.OLLAMA_MODEL }}
        run: |
          uv run run-agent project-creator

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-creator-results
          path: results/project-creator_*.json
          retention-days: 30
