name: Conflict Resolver

on:
  schedule:
    - cron: "0 12 * * *"
      timezone: "America/Sao_Paulo"
      
  workflow_dispatch:
    inputs:
      pr_ref:
        description: 'PR Reference (owner/repo#number)'
        required: false
        default: ''

jobs:
  resolve:
    runs-on: ubuntu-latest
    env:
      OLLAMA_MODELS_DIR: /home/runner/.ollama/models
      OLLAMA_MODEL: qwen3:1.7b
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Setup Ollama
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ env.OLLAMA_MODEL }}
          models-dir: ${{ env.OLLAMA_MODELS_DIR }}
          startup-delay-seconds: "5"

      - name: Run Conflict Resolver Agent
        env:
          PYTHONPATH: .
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_OWNER: juninmd
          ENABLE_AI: true
          AI_PROVIDER: ollama
          AI_MODEL: ${{ env.OLLAMA_MODEL }}
        run: |
          if [ -n "${{ github.event.inputs.pr_ref }}" ]; then
            uv run run-agent conflict-resolver --pr "${{ github.event.inputs.pr_ref }}"
          else
            uv run run-agent conflict-resolver
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conflict-resolver-results
          path: results/conflict-resolver_*.json
          retention-days: 1
