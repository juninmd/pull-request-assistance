name: PR Assistant Agent

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      pr_ref:
        description: 'Optional PR reference (owner/repo#number)'
        required: false
        default: ''

jobs:
  run-pr-assistant:
    runs-on: ubuntu-latest
    env:
      OLLAMA_MODELS_DIR: /home/runner/.ollama/models
      OLLAMA_MODEL: qwen3:1.7b
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Cache Ollama model files
        id: ollama-cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ${{ env.OLLAMA_MODELS_DIR }}
          key: ${{ runner.os }}-ollama-${{ env.OLLAMA_MODEL }}
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Install & start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}
          ollama list

      - name: Run PR Assistant Agent
        env:
          PYTHONPATH: .
          # Use GH_PAT for merge permissions, fallback to GITHUB_TOKEN for local testing
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_OWNER: juninmd
          PR_ASSISTANT_ENABLED: true
          ENABLE_AI: true
          AI_PROVIDER: ollama
          AI_MODEL: ${{ env.OLLAMA_MODEL }}
        run: |
          uv run run-agent pr-assistant ${{ github.event.inputs.pr_ref }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-assistant-results
          path: logs/pr-assistant-*.json
          retention-days: 1
