name: Code Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'google-labs-jules[bot]' && github.event.pull_request.user.login != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run Code Reviewer Agent
        env:
          PYTHONPATH: .
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_OWNER: juninmd
          ENABLE_AI: true
          AI_PROVIDER: ollama
          AI_MODEL: qwen3:1.7b
        run: |
          PR_REF="${{ github.repository }}#${{ github.event.pull_request.number }}"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            uv run run-agent code-reviewer --pr "$PR_REF"
          else
            uv run run-agent code-reviewer
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-reviewer-results
          path: results/code-reviewer_*.json
          retention-days: 1
