name: Secret Remover Agent

on:
  schedule:
    # Runs every day at 8:00 AM UTC (after the scanner at 6:00)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-secret-remover:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Download latest security-scanner results
        uses: actions/download-artifact@v4
        with:
          name: security-scanner-results
          path: results/
        continue-on-error: true

      - name: Run Secret Remover Agent
        env:
          PYTHONPATH: .
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_OWNER: juninmd
          ENABLE_AI: "true"
          AI_PROVIDER: ollama
          AI_MODEL: ${{ env.OLLAMA_MODEL }}
          SECRET_REMOVER_ENABLED: "true"
        run: |
          uv run run-agent secret-remover

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-remover-results
          path: results/secret-remover_*.json
          retention-days: 30
