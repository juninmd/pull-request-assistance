name: Secret Remover Agent

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 12 * * 5"
      timezone: "America/Sao_Paulo"
  workflow_dispatch:

jobs:
  run-secret-remover:
    runs-on: ubuntu-latest
    env:
      OLLAMA_MODELS_DIR: /home/runner/.ollama/models
      OLLAMA_MODEL: qwen3:1.7b
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Setup Ollama
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ env.OLLAMA_MODEL }}
          models-dir: ${{ env.OLLAMA_MODELS_DIR }}
          startup-delay-seconds: "5"

      - name: Install git-filter-repo
        run: uv pip install git-filter-repo

      - name: Run Security Scanner Agent (Independent Run)
        env:
          PYTHONPATH: .
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_OWNER: juninmd
          SECURITY_SCANNER_ENABLED: "true"
        run: |
          uv run run-agent security-scanner

      - name: Run Secret Remover Agent
        env:
          PYTHONPATH: .
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_OWNER: juninmd
          ENABLE_AI: "true"
          AI_PROVIDER: ollama
          AI_MODEL: ${{ env.OLLAMA_MODEL }}
          SECRET_REMOVER_ENABLED: "true"
        run: |
          uv run run-agent secret-remover

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-remover-results
          path: results/
          retention-days: 30
