name: Product Manager Agent

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 12 * * 4"
      timezone: "America/Sao_Paulo"
  workflow_dispatch:  # Allow manual triggers

jobs:
  run-product-manager:
    runs-on: ubuntu-latest
    env:
      OLLAMA_MODELS_DIR: /home/runner/.ollama/models
      OLLAMA_MODEL: qwen3:1.7b
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Setup Ollama
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ env.OLLAMA_MODEL }}
          models-dir: ${{ env.OLLAMA_MODELS_DIR }}
          startup-delay-seconds: "10"

      - name: Run Product Manager Agent
        env:
          PYTHONPATH: .
          # Use GH_PAT for repository operations, fallback to GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_OWNER: juninmd
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PM_AGENT_ENABLED: true
          ENABLE_AI: true
          AI_PROVIDER: ollama
          AI_MODEL: ${{ env.OLLAMA_MODEL }}
        run: |
          uv run run-agent product-manager

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-manager-results
          path: results/product-manager_*.json
          retention-days: 30
